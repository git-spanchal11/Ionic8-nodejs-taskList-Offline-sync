<form (ngSubmit)="onSubmit()">
  <ion-list>
    <ion-item>
      <ion-input label="Email" labelPlacement="floating" type="email" name="email" [(ngModel)]="credentials.email" required></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Password" labelPlacement="floating" type="password" name="password" [(ngModel)]="credentials.password" required></ion-input>
    </ion-item>
  </ion-list>
  <div class="ion-padding">
    <ion-button expand="block" type="submit" [disabled]="!credentials.email || !credentials.password">Login</ion-button>
  </div>
</form>
